[databases]
* = host=postgis port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = gis_user
auth_query = SELECT username, password FROM pgbouncer.get_auth($1)
auth_dbname = gis

pool_mode = transaction
max_client_conn = 100
default_pool_size = 5
reserve_pool_size = 2
server_reset_query = DISCARD ALL
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
ignore_startup_parameters = extra_float_digits

# Enable native support for prepared statements in Transaction Mode (PgBouncer >= 1.21)
max_prepared_statements = 10
